services:
  - type: web
    name: ghost-writer-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 4 -k uvicorn.workers.UvicornWorker main:app
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SUPABASE_URL
        value: "https://kpeslowdqajzlmhlwajm.supabase.co"
      - key: SUPABASE_KEY
        sync: false
      - key: PINECONE_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: '["*"]'
      - key: LOCAL_ONLY_MODE
        value: "false"
