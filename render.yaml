services:
  - type: web
    name: ghost-writer-backend
    env: docker
    plan: free
    region: ohio
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SUPABASE_URL
        value: "https://kpeslowdqajzlmhlwajm.supabase.co"
      - key: SUPABASE_KEY
        sync: false
      - key: PINECONE_API_KEY
        sync: false
      - key: PINECONE_INDEX_NAME
        value: "ghost-writer-memories"
      - key: PINECONE_ENVIRONMENT
        value: "us-east-1-aws"
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: '["*"]'
      - key: LOCAL_ONLY_MODE
        value: "false"
      - key: PORT
        value: "8000"
      - key: MAX_FILE_SIZE_MB
        value: "50"

